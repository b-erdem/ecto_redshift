services:
  postgres:
    image: postgres:16-alpine
    container_name: ecto-redshift-postgres-smoke
    environment:
      POSTGRES_DB: ecto_redshift_smoke
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecto_redshift_smoke"]
      interval: 5s
      timeout: 5s
      retries: 10
